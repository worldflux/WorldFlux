name: SBOM

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sbom-generate:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install project dependencies
        run: uv sync

      - name: Generate CycloneDX SBOM
        run: |
          uv run --with cyclonedx-bom cyclonedx-py environment \
            --of json \
            -o sbom-cyclonedx.json \
            .venv

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json
          retention-days: 90

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: sbom-cyclonedx.json

  trivy-container:
    name: Container Scan (Trivy)
    # Only run on pushes to main and releases, not on PRs
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag worldflux-scan:${{ github.sha }} .

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL \
            --timeout 30m \
            worldflux-scan:${{ github.sha }}

      - name: Generate container SBOM
        run: |
          trivy image \
            --format cyclonedx \
            --output container-sbom.json \
            worldflux-scan:${{ github.sha }}

      - name: Upload container SBOM
        uses: actions/upload-artifact@v7
        with:
          name: container-sbom-cyclonedx
          path: container-sbom.json
          retention-days: 90
