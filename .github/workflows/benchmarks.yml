name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read

jobs:
  full-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv sync --extra dev --extra training

      - name: Run DreamerV3 full benchmark
        run: uv run python benchmarks/benchmark_dreamerv3_atari.py --full --seed 42

      - name: Run TD-MPC2 full benchmark
        run: uv run python benchmarks/benchmark_tdmpc2_mujoco.py --full --seed 42

      - name: Run diffusion full benchmark
        run: uv run python benchmarks/benchmark_diffusion_imagination.py --full --seed 42

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: benchmark-artifacts
          path: outputs/benchmarks/
